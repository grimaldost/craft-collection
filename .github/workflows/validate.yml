name: validate

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install validator deps
        run: pip install pyyaml
      - name: Validate plugins (structural)
        run: python scripts/validate_plugins.py
      - name: Run skill + hook tests
        shell: bash
        run: |
          fail=0
          while IFS= read -r t; do
            echo "== $t"
            ( cd "$(dirname "$t")" && python "$(basename "$t")" ) || fail=1
          done < <(find plugins -name 'test_*.py')
          exit $fail
