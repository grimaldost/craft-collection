name: validate

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install tooling
        run: pip install pyyaml ruff==0.15.7
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Validate plugins (structural)
        run: python scripts/validate_plugins.py
      - name: Run tests
        run: python scripts/run_tests.py
